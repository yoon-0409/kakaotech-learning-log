<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>To Do</h1>
    </header>
    <main>
      <div class="date-nav">
        <button id="prev-date">◀</button>
        <input type="date" id="current-date" />
        <button id="next-date">▶</button>
      </div>
      <input id="todo-input" placeholder="오늘의 할 일을 입력하세요" />
      <div id="filters" class="filters">
        <button class="filter-btn" id="all-btn" data-filter="all">전체</button>
        <button class="filter-btn" id="progress-btn" data-filter="progress">
          진행중
        </button>
        <button class="filter-btn" id="complete-btn" data-filter="complete">
          완료
        </button>
        <button class="filter-btn" id="every-btn" data-filter="every">
          모두
        </button>
      </div>
      <ul id="todo-list"></ul>
    </main>
    <script src="app.js"></script>
  </body>
</html>
